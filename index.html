<!DOCTYPE html>
<html lang="cs">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sky-50: #f0f9ff; --sky-100: #e0f2fe; --sky-200: #bae6fd;

}
body { font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif; background: linear-gradient(180deg, var(--sky-100) 0%, var(--sky-50) 40%, #fff 100%); color: var(--slate-800); min-height: 100vh; }
#app { max-width: 540px; margin: 0 auto; padding: 0 16px 40px; }
.header { text-align: center; padding: 28px 0 6px; }
.header-icon { font-size: 44px; }
.header h1 { font-size: 24px; font-weight: 800; color: var(--sky-900); letter-spacing: -0.5px; margin: 4px 0; }

.tabs { display: flex; gap: 4px; margin: 18px 0 14px; background: var(--slate-200); border-radius: 12px; padding: 4px; }
.tabs button { flex: 1; padding: 10px 6px; border: none; border-radius: 10px; background: transparent; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--slate-500); font-family: inherit; transition: all .2s; }
.tabs button.active { background: #fff; color: var(--sky-900); box-shadow: 0 1px 4px rgba(0,0,0,.08); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.card { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }

.input:focus { border-color: var(--sky-500); }

.btn:disabled { opacity: .5; cursor: default; }

.btn-tiny { padding: 4px 10px; border-radius: 8px; border: 1px solid var(--slate-300); background: #fff; color: var(--slate-500); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-rm { background: var(--red-50); border: none; border-radius: 8px; width: 28px; height: 28px; cursor: pointer; color: var(--red-500); font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.btn-move { background: var(--slate-100); border: none; border-radius: 6px; width: 26px; height: 26px; cursor: pointer; color: var(--slate-500); font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; touch-action: manipulation; }
.btn-edit { background: var(--sky-50); border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; touch-action: manipulation; }
.btn-danger { background: var(--red-500); color: #fff; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; font-family: inherit; }
.w-full { width: 100%; }
.mt-sm { margin-top: 14px; }
.mt-md { margin-top: 16px; }

.badge { background: var(--sky-50); border: 2px solid var(--sky-200); border-radius: 10px; padding: 10px 14px; font-size: 14px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
.pick-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding: 8px 14px; background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }

.pick-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--slate-200); transition: all .2s; }
.pick-dot.filled { background: var(--sky-500); box-shadow: 0 0 6px rgba(14,165,233,.4); }
.pick-dot.add.filled { background: var(--green-600); box-shadow: 0 0 6px rgba(5,150,105,.4); }
.pick-num { font-size: 13px; font-weight: 800; color: var(--sky-900); margin-left: auto; }
.add-own { background: #fff; border-radius: 12px; padding: 14px; margin: 10px 0 14px; border: 2px dashed var(--sky-200); }
.add-own-label { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--sky-900); }
.add-own-note { font-weight: 400; color: var(--slate-400); font-size: 11px; }
.pick-hint { font-size: 13px; color: var(--slate-500); margin-bottom: 10px; }
.drink-rows { display: flex; flex-direction: column; gap: 4px; }
.d-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--slate-200); background: #fff; cursor: pointer; transition: all .15s; font-family: inherit; font-size: 14px; text-align: left; width: 100%; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
.d-row:active { background: var(--slate-100); }
.d-row.selected { border-color: var(--sky-600); background: var(--sky-50); }
.d-row-emoji { font-size: 18px; flex-shrink: 0; }
.d-row-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.d-row-tick { color: var(--sky-600); font-weight: 900; font-size: 16px; }
.pick-summary { margin-top: 14px; padding: 12px 14px; background: var(--sky-50); border-radius: 10px; border: 1px solid var(--sky-200); }
.pick-sum-label { font-size: 12px; font-weight: 700; color: var(--sky-900); margin-bottom: 8px; }
.pick-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.pick-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid var(--slate-300); }
.pick-tag.new { border-color: var(--green-200); background: var(--green-50); }
.new-badge { font-size: 9px; font-weight: 700; color: var(--green-600); background: var(--green-200); padding: 1px 5px; border-radius: 4px; text-transform: uppercase; }
.pick-tag-x { background: none; border: none; color: var(--slate-400); cursor: pointer; font-size: 12px; font-weight: 700; padding: 0; margin-left: 2px; }
.empty { text-align: center; padding: 40px 0; }
.empty-icon { font-size: 40px; }
.empty-text { color: var(--slate-400); font-size: 14px; margin-top: 8px; }
.stats { display: flex; gap: 8px; margin-bottom: 16px; }
.stat-box { flex: 1; background: #fff; border-radius: 12px; padding: 12px 8px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.stat-n { display: block; font-size: 22px; font-weight: 800; color: var(--sky-900); }
.stat-l { font-size: 11px; color: var(--slate-400); font-weight: 600; }
.res-list { display: flex; flex-direction: column; gap: 8px; }
.res-row { display: flex; align-items: center; gap: 10px; background: #fff; border-radius: 12px; padding: 11px 12px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.res-rank { font-size: 18px; width: 30px; text-align: center; flex-shrink: 0; }
.res-info { flex: 1; min-width: 0; }
.res-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.res-name { font-weight: 700; font-size: 13px; }
.res-votes { font-size: 12px; color: var(--slate-500); font-weight: 600; }
.bar-bg { height: 7px; border-radius: 4px; background: var(--slate-100); overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; min-width: 2px; }
.admin-block { margin-bottom: 24px; }
.admin-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.a-list { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
.a-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; background: #fff; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.04); gap: 8px; }
.a-item-name { font-weight: 700; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.a-item-sub { font-size: 11px; color: var(--slate-500); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.a-vote-count { font-weight: 400; color: var(--slate-400); font-size: 12px; }
.voted-badge { font-size: 10px; font-weight: 600; color: var(--sky-600); background: var(--sky-100); padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.pass-chip { font-family: monospace; font-size: 12px; font-weight: 700; color: var(--sky-900); background: var(--sky-50); border: 1px solid var(--sky-200); padding: 3px 8px; border-radius: 6px; cursor: pointer; letter-spacing: 0.5px; touch-action: manipulation; }
.pass-chip:active { background: var(--sky-100); }
.merge-preview { font-size: 12px; color: var(--slate-500); margin-top: 8px; line-height: 1.5; }
.active-warn { margin-bottom: 20px; padding: 14px 16px; border-radius: 12px; background: #fef3c7; border: 2px solid #fcd34d; }
.active-warn-title { font-size: 14px; font-weight: 800; color: #92400e; margin-bottom: 6px; }
.active-warn-text { font-size: 12px; color: #78350f; margin-bottom: 10px; line-height: 1.4; }
.active-list { display: flex; flex-wrap: wrap; gap: 6px; }
.active-chip { display: inline-flex; align-items: center; padding: 4px 10px; background: #fff; border-radius: 8px; font-size: 12px; font-weight: 700; color: #78350f; border: 1px solid #fcd34d; }
.danger { margin-top: 20px; padding: 16px; border-radius: 12px; border: 2px dashed var(--red-200); background: var(--red-50); }
.danger-label { font-size: 11px; font-weight: 700; color: var(--red-500); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
.loading-icon { font-size: 48px; margin-bottom: 12px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
.loading-text { color: var(--slate-500); font-size: 14px; }
.footer { text-align: center; font-size: 12px; color: var(--slate-400); margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--slate-200); }
.overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.55); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 9999; animation: fadeIn .15s; }
.overlay-box { background: #fff; border-radius: 16px; padding: 28px 36px; display: flex; flex-direction: column; align-items: center; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,.3); max-width: 320px; }
.overlay-spinner { width: 44px; height: 44px; border: 4px solid var(--slate-200); border-top-color: var(--sky-500); border-radius: 50%; animation: spin 0.8s linear infinite; }
.overlay-text { font-size: 16px; font-weight: 700; color: var(--sky-900); margin: 0; }
.overlay-sub { font-size: 12px; color: var(--slate-500); margin: 0; text-align: center; }
@keyframes spin { to { transform: rotate(360deg); } }
.setup-card { background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,.08); margin-top: 20px; }
.setup-card h2 { font-size: 18px; font-weight: 800; color: var(--sky-900); margin-bottom: 4px; }
.setup-card p { font-size: 13px; color: var(--slate-500); margin-bottom: 16px; }
.setup-card ol { font-size: 13px; color: var(--slate-800); line-height: 1.8; padding-left: 20px; margin-bottom: 16px; }
.setup-card code { background: var(--slate-100); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  KONFIGURACE — vyplňte po založení Supabase projektu     ║
// ╚══════════════════════════════════════════════════════════╝
const CONFIG = {
  SUPABASE_URL:     'https://vcomrwktliceefyigoqg.supabase.co',  // např. https://xxxxxxxx.supabase.co
  SUPABASE_ANON:    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjb21yd2t0bGljZWVmeWlnb3FnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzEyMTYsImV4cCI6MjA5MTkwNzIxNn0.Nwi3neRrZWS8bbMZRJV2FLB8A8XqxxMrwAtMrbSO2nc',  // anon public key (dlouhý JWT)
  MAX_VOTES:        3,
  MAX_ADDS:         1,
};
// ════════════════════════════════════════════════════════════

const EMOJIS = ['🥤','🧃','🍺','☕','🫧','🍹','🧊','💧','🍋','🫖','🥛','🍵','🫗','🍷','🥂','🧋'];
const emoji = i => EMOJIS[i % EMOJIS.length];
const norm = s => s.trim().toLowerCase().replace(/\s+/g, ' ');

let supa = null;
let state = {
  data: { drinks: [], votes: {}, voters: [], users: [], activeVoters: [], adminPin: 'lednice2026' },
  loading: true, loadError: false, tab: 'vote', toast: '', submitting: false,
  loginName: '', loginPass: '', loginError: '', currentUser: null,
  picks: [], newDrinkInput: '',
  adminUnlocked: false, pinInput: '', pinError: false,
  adminNewDrink: '', newUserName: '',
  mergeA: '', mergeB: '',
  newAdminPin: '',
};

function setState(patch) {
  if (state.submitting && 'data' in patch && !('submitting' in patch)) {
    const { data, ...rest } = patch;
    Object.assign(state, rest);
  } else {
    Object.assign(state, patch);
  }
  render();
}

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  setState({ toast: msg });
  toastTimer = setTimeout(() => setState({ toast: '' }), 2800);
}

function voteLabel(v) { return v === 1 ? 'hlas' : (v >= 2 && v <= 4 ? 'hlasy' : 'hlasů'); }
function rankIcon(i, v) { if (v === 0) return `${i + 1}.`; return i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`; }

// ── Supabase data loading ──
async function loadData() {
  try {
    const [drinksRes, votersRes, usersRes, activeRes, settingsRes] = await Promise.all([
      supa.from('drinks').select('*').order('position'),
      supa.from('voters').select('*'),
      supa.from('users').select('*'),
      supa.from('active_voters').select('*').gte('ts', new Date(Date.now() - 30000).toISOString()),
      supa.from('settings').select('*').eq('key', 'admin_pin').maybeSingle(),
    ]);
    if (drinksRes.error) throw drinksRes.error;
    if (votersRes.error) throw votersRes.error;
    if (usersRes.error) throw usersRes.error;

    const drinks = (drinksRes.data || []).map(d => d.name);
    const votes = {};
    (drinksRes.data || []).forEach(d => { votes[d.name] = d.votes || 0; });
    const voters = (votersRes.data || []).map(v => ({ id: v.id, name: v.name, picks: v.picks || [] }));
    const users = (usersRes.data || []).map(u => ({ id: u.id, name: u.name, password: u.password }));
    const activeVoters = (activeRes.data || []).map(a => ({ id: a.id, name: a.name, ts: new Date(a.ts).getTime() }));
    const adminPin = settingsRes.data?.value || 'lednice2026';

    setState({ data: { drinks, votes, voters, users, activeVoters, adminPin }, loading: false, loadError: false });
  } catch (e) {
    console.error('Load error:', e);
    setState({ loading: false, loadError: true });
    showToast('Chyba při načítání. Zkuste znovu.');
  }
}

// ── Heartbeat for active voters ──
const HEARTBEAT_INTERVAL = 15000;
let heartbeatTimer = null;

async function heartbeatPing() {
  if (!state.currentUser) return;
  try {
    await supa.from('active_voters').upsert({
      id: state.currentUser.id, name: state.currentUser.name, ts: new Date().toISOString(),
    });
  } catch (e) { console.warn('Heartbeat failed:', e); }
}

function startHeartbeat() { stopHeartbeat(); heartbeatPing(); heartbeatTimer = setInterval(heartbeatPing, HEARTBEAT_INTERVAL); }
function stopHeartbeat() { if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; } }

async function clearActiveVoter(userId) {
  try { await supa.from('active_voters').delete().eq('id', userId); }
  catch (e) { console.warn('Clear active voter failed:', e); }
}

// ── Login/Logout ──
function doLogin() {
  const { loginName, loginPass, data } = state;
  if (!loginName.trim() || !loginPass.trim()) { setState({ loginError: 'Vyplňte jméno i heslo.' }); return; }
  const id = norm(loginName);
  const user = data.users.find(u => u.id === id);
  if (!user) { setState({ loginError: 'Uživatel nenalezen. Požádejte správce o přidání.' }); return; }
  if (user.password !== loginPass) { setState({ loginError: 'Špatné heslo.' }); return; }
  if (data.voters.some(v => v.id === id)) { setState({ loginError: 'Pod tímto účtem už bylo hlasováno!' }); return; }
  setState({ currentUser: user, loginError: '', loginName: '', loginPass: '', picks: [], newDrinkInput: '' });
  startHeartbeat();
}

function doLogout() {
  stopHeartbeat();
  if (state.currentUser) clearActiveVoter(state.currentUser.id);
  setState({ currentUser: null, picks: [], newDrinkInput: '' });
}

window.addEventListener('beforeunload', () => { stopHeartbeat(); });

// ── Vote picking ──
function countPicks() {
  const existing = state.data.drinks || [];
  const votes = state.picks.filter(p => existing.some(d => norm(d) === norm(p)));
  const adds = state.picks.filter(p => !existing.some(d => norm(d) === norm(p)));
  return { votes, adds };
}

function togglePick(drink) {
  const { picks } = state;
  if (picks.includes(drink)) { setState({ picks: picks.filter(p => p !== drink) }); return; }
  const { votes } = countPicks();
  if (votes.length >= CONFIG.MAX_VOTES) { showToast(`Max. ${CONFIG.MAX_VOTES} hlasy pro existující nápoje!`); return; }
  setState({ picks: [...picks, drink] });
}

function removePick(drink) { setState({ picks: state.picks.filter(p => p !== drink) }); }

function addOwnDrink() {
  const name = state.newDrinkInput.trim();
  if (!name) return;
  const existing = state.data.drinks.find(d => norm(d) === norm(name));
  if (existing) {
    const { votes } = countPicks();
    if (state.picks.includes(existing)) { showToast(`„${existing}" už máš vybraný.`); setState({ newDrinkInput: '' }); return; }
    if (votes.length >= CONFIG.MAX_VOTES) { showToast(`„${existing}" už existuje, ale máš maximum hlasů.`); setState({ newDrinkInput: '' }); return; }
    setState({ picks: [...state.picks, existing], newDrinkInput: '' });
    showToast(`„${existing}" už existuje — přidán hlas.`);
    return;
  }
  const { adds } = countPicks();
  if (adds.length >= CONFIG.MAX_ADDS) { showToast(`Můžeš přidat max. ${CONFIG.MAX_ADDS} nový nápoj.`); return; }
  const inPicks = state.picks.find(p => norm(p) === norm(name));
  if (inPicks) { showToast(`„${inPicks}" už máš vybraný.`); setState({ newDrinkInput: '' }); return; }
  setState({ picks: [...state.picks, name], newDrinkInput: '' });
}

// ── Submit vote (ATOMIC via RPC) ──
async function submitVote() {
  if (state.picks.length === 0) { showToast('Vyber nebo přidej alespoň 1 nápoj!'); return; }
  if (!state.currentUser || state.submitting) return;
  setState({ submitting: true });
  try {
    const { error } = await supa.rpc('submit_vote', {
      voter_id: state.currentUser.id,
      voter_name: state.currentUser.name,
      voter_picks: state.picks,
    });
    if (error) throw error;
    stopHeartbeat();
    await clearActiveVoter(state.currentUser.id);
    await loadData();
    setState({ picks: [], currentUser: null, tab: 'results', submitting: false });
    showToast('🎉 Díky za hlas!');
  } catch (e) {
    console.error('Submit error:', e);
    setState({ submitting: false });
    if (e.message && e.message.includes('already voted')) {
      showToast('Už jste hlasoval/a!');
    } else {
      showToast('Chyba při odesílání. Zkuste znovu.');
    }
  }
}

// ── Admin ──
function tryUnlockAdmin() {
  const pin = state.data?.adminPin || 'lednice2026';
  if (state.pinInput === pin) setState({ adminUnlocked: true, pinError: false, pinInput: '' });
  else setState({ pinError: true });
}

async function withLoading(fn, successMsg) {
  try {
    await fn();
    await loadData();
    if (successMsg) showToast(successMsg);
  } catch (e) {
    console.error(e);
    showToast('Chyba: ' + (e.message || 'neznámá'));
  }
}

async function adminAddDrink() {
  const name = state.adminNewDrink.trim();
  if (!name) return;
  if (state.data.drinks.some(d => norm(d) === norm(name))) { showToast('Tento nápoj už existuje.'); return; }
  const maxPos = Math.max(0, ...state.data.drinks.map((_, i) => i)) + 1;
  await withLoading(async () => {
    const { error } = await supa.from('drinks').insert({ name, votes: 0, position: maxPos });
    if (error) throw error;
  }, `✅ ${name} přidán!`);
  setState({ adminNewDrink: '' });
}

async function adminRemoveDrink(drink) {
  await withLoading(async () => {
    const { error } = await supa.rpc('remove_drink', { drink_name: drink });
    if (error) throw error;
  }, `🗑 ${drink} odstraněn.`);
}

async function adminRenameDrink(oldName) {
  const newName = prompt('Nový název nápoje:', oldName);
  if (!newName || newName.trim() === '' || newName.trim() === oldName) return;
  const trimmed = newName.trim();
  if (state.data.drinks.some(d => d !== oldName && norm(d) === norm(trimmed))) {
    showToast('Nápoj s tímto názvem už existuje.'); return;
  }
  await withLoading(async () => {
    const { error } = await supa.rpc('rename_drink', { old_name: oldName, new_name: trimmed });
    if (error) throw error;
  }, `✅ Přejmenováno na „${trimmed}".`);
}

async function adminMoveDrink(index, dir) {
  const newIndex = index + dir;
  if (newIndex < 0 || newIndex >= state.data.drinks.length) return;
  const drinks = [...state.data.drinks];
  [drinks[index], drinks[newIndex]] = [drinks[newIndex], drinks[index]];
  await withLoading(async () => {
    const updates = drinks.map((name, i) => supa.from('drinks').update({ position: i }).eq('name', name));
    await Promise.all(updates);
  });
}

async function adminRemoveVoter(voterId) {
  const voter = state.data.voters.find(v => v.id === voterId);
  if (!voter) return;
  await withLoading(async () => {
    const { error } = await supa.rpc('remove_voter', { voter_id: voterId });
    if (error) throw error;
  }, `🗑 Hlas od „${voter.name}" smazán.`);
}

function generatePassword() {
  const chars = 'abcdefghijkmnpqrstuvwxyz23456789';
  let p = ''; const arr = new Uint32Array(6); crypto.getRandomValues(arr);
  for (let i = 0; i < 6; i++) p += chars[arr[i] % chars.length];
  return p;
}

async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); showToast('📋 Zkopírováno: ' + text); }
  catch {
    const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('📋 Zkopírováno: ' + text); } catch { showToast('Nelze zkopírovat: ' + text); }
    document.body.removeChild(ta);
  }
}

async function adminAddUser() {
  const name = state.newUserName.trim();
  if (!name) { showToast('Vyplňte jméno.'); return; }
  const id = norm(name);
  if (state.data.users.some(u => u.id === id)) { showToast('Tento uživatel už existuje.'); return; }
  const pass = generatePassword();
  await withLoading(async () => {
    const { error } = await supa.from('users').insert({ id, name, password: pass });
    if (error) throw error;
  }, `✅ ${name} přidán. Heslo: ${pass}`);
  setState({ newUserName: '' });
}

async function adminRemoveUser(userId) {
  await withLoading(async () => {
    const { error } = await supa.from('users').delete().eq('id', userId);
    if (error) throw error;
  }, 'Uživatel odebrán.');
}

async function adminMerge() {
  const { mergeA, mergeB } = state;
  if (!mergeA || !mergeB || mergeA === mergeB) { showToast('Vyberte dva různé nápoje.'); return; }
  await withLoading(async () => {

async function adminChangePin() {

async function resetAll() {

function adminExportCSV() {
  const { data } = state;
  const sorted = [...data.drinks].sort((a, b) => (data.votes[b] || 0) - (data.votes[a] || 0));
  const lines = ['Nápoj;Hlasů'];
  sorted.forEach(d => { lines.push(`${d};${data.votes[d] || 0}`); });
  lines.push('');
  lines.push(`Celkem hlasujících;${data.voters.length}`);
  lines.push(`Celkem hlasů;${Object.values(data.votes).reduce((a, b) => a + b, 0)}`);
  const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'anketa-lednice.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('📥 CSV exportováno.');
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v == null || v === false) el.removeAttribute(k);
    else if (v === true) el.setAttribute(k, '');
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(c) : c);
  });
  return el;
}

  for (let i = 0; i < CONFIG.MAX_ADDS; i++) addDots.appendChild(h('span', { className: `pick-dot add ${i < addP.length ? 'filled' : ''}` }));
  content.appendChild(h('div', { className: 'pick-bar' }, h('span', { className: 'pick-label' }, '➕ Nové nápoje:'), addDots, h('span', { className: 'pick-num' }, `${addP.length}/${CONFIG.MAX_ADDS}`)));

function renderResults() {
  const { data } = state;
  if (data.drinks.length === 0) {
    return h('div', { className: 'empty' }, h('p', { className: 'empty-icon' }, '📊'), h('p', { className: 'empty-text' }, 'Zatím nejsou žádné nápoje ani hlasy.'));
  }
  const sorted = [...data.drinks].sort((a, b) => (data.votes[b] || 0) - (data.votes[a] || 0));
  const maxV = Math.max(...Object.values(data.votes || {}), 1);
  const totalVotes = Object.values(data.votes).reduce((a, b) => a + b, 0);

  const content = h('div', null);
  content.appendChild(h('div', { className: 'stats' },
    h('div', { className: 'stat-box' }, h('span', { className: 'stat-n' }, `${data.voters.length}`), h('span', { className: 'stat-l' }, 'hlasujících')),

    const selB = h('select', { className: 'select', onInput: e => { state.mergeB = e.target.value; render(); } }, h('option', { value: '' }, 'Sloučit ↓'));
    data.drinks.filter(d => d !== state.mergeA).forEach(d => { const o = h('option', { value: d }, `${d} (${data.votes[d]||0})`); if (d === state.mergeB) o.selected = true; selB.appendChild(o); });
    mergeBlock.appendChild(h('div', { className: 'row' }, selA, h('span', { style: { fontWeight: '700', color: 'var(--slate-500)', alignSelf: 'center' } }, '←'), selB));
    if (state.mergeA && state.mergeB && state.mergeA !== state.mergeB) {
      const total = (data.votes[state.mergeA]||0) + (data.votes[state.mergeB]||0);
      mergeBlock.appendChild(h('p', { className: 'merge-preview' },
        `„${state.mergeB}" (${data.votes[state.mergeB]||0}) → „${state.mergeA}" (${data.votes[state.mergeA]||0}) = `, h('strong', null, `${total} hlasů`)));
    }
    mergeBlock.appendChild(h('button', { className: 'btn btn-p mt-sm', onClick: adminMerge }, 'Sloučit'));
    content.appendChild(mergeBlock);
  }

  // Voter management
  const voterBlock = h('div', { className: 'admin-block' },
    h('p', { className: 'admin-title' }, '🗳 Správa hlasů'),
    h('p', { className: 'hint' }, 'Smazáním hlasu umožníte dané osobě hlasovat znovu.'));
  if (data.voters.length === 0) {
    voterBlock.appendChild(h('p', { className: 'hint' }, 'Zatím nikdo nehlasoval.'));
  } else {
    const vl = h('div', { className: 'a-list' });
    data.voters.forEach(voter => {
      const info = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '2px', flex: '1', minWidth: '0' } },
        h('span', { className: 'a-item-name' }, voter.name),
        h('span', { className: 'a-item-sub' }, (voter.picks||[]).join(', ')));
      vl.appendChild(h('div', { className: 'a-item' }, info, h('button', { className: 'btn-rm', onClick: () => adminRemoveVoter(voter.id) }, '✕')));
    });
    voterBlock.appendChild(vl);
  }
  content.appendChild(voterBlock);

  // PIN change
  const pinBlock = h('div', { className: 'admin-block' }, h('p', { className: 'admin-title' }, '🔑 Heslo správce'));
  const newPinIn = h('input', { className: 'input', type: 'password', placeholder: 'Nové heslo…',
    value: state.newAdminPin || '', onInput: e => { state.newAdminPin = e.target.value; } });
  pinBlock.appendChild(h('div', { className: 'row' }, newPinIn, h('button', { className: 'btn btn-p', onClick: adminChangePin }, 'Změnit')));
  content.appendChild(pinBlock);

  // Export
  if (data.drinks.length > 0) {
    content.appendChild(h('div', { className: 'admin-block' },
      h('p', { className: 'admin-title' }, '📥 Export výsledků'),
      h('button', { className: 'btn btn-sec', onClick: adminExportCSV }, '📥 Stáhnout CSV')));
  }

  // Danger
  content.appendChild(h('div', { className: 'danger' },
    h('p', { className: 'danger-label' }, 'Nebezpečná zóna'),
    h('button', { className: 'btn-danger', onClick: resetAll }, '🗑 Resetovat celou anketu')));

  return content;
}

// ── Init ──
if (CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON) {
  supa = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON);
  loadData();
} else {
  state.loading = false;
}
render();

// Auto-refresh in admin to see active voters
setInterval(() => {
  if (state.tab === 'admin' && state.adminUnlocked && !state.loading && !state.submitting) {
    loadData();
  }
}, 10000);
</script>
</body>
</html>
